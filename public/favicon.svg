<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Steering wheel outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#0F2A44" stroke-width="2.5"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="3.5" fill="#0F2A44"/>
  <!-- Spokes -->
  <line x1="16" y1="12.5" x2="16" y2="3" stroke="#0F2A44" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="12.5" y1="18" x2="5" y2="22" stroke="#0F2A44" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="19.5" y1="18" x2="27" y2="22" stroke="#0F2A44" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Road line at bottom (globe/road motif) -->
  <line x1="13" y1="29" x2="15.5" y2="23" stroke="#0F2A44" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="19" y1="29" x2="16.5" y2="23" stroke="#0F2A44" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Road center dashes -->
  <line x1="16" y1="29.5" x2="16" y2="27.5" stroke="#0F2A44" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <line x1="16" y1="26" x2="16" y2="25" stroke="#0F2A44" stroke-width="0.6" stroke-linecap="round" opacity="0.3"/>
</svg>
