<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <title>Stop hand signal — driver's forearm extended downward</title>
  <!-- Background -->
  <rect x="5" y="5" width="110" height="110" rx="8" fill="#FFF9C4" stroke="#F57F17" stroke-width="2"/>
  <!-- Car door outline -->
  <rect x="45" y="10" width="40" height="50" rx="4" fill="none" stroke="#333" stroke-width="2.5"/>
  <!-- Window -->
  <rect x="49" y="13" width="32" height="18" rx="2" fill="#B3E5FC" stroke="#333" stroke-width="1.5"/>
  <!-- Upper arm extending out from window -->
  <line x1="49" y1="38" x2="25" y2="38" stroke="#8D6E63" stroke-width="5" stroke-linecap="round"/>
  <!-- Forearm pointing down (stop signal) -->
  <line x1="25" y1="38" x2="25" y2="78" stroke="#8D6E63" stroke-width="5" stroke-linecap="round"/>
  <!-- Open palm facing backward -->
  <ellipse cx="25" cy="82" rx="5" ry="4" fill="#8D6E63"/>
  <!-- Downward arrow indicator -->
  <polygon points="17,70 25,84 33,70" fill="#333" opacity="0.5"/>
  <!-- Label -->
  <text x="60" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#333">STOP / ALTO</text>
</svg>
