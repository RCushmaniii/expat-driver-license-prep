<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <title>U-turn prohibited — prohibitive sign</title>
  <!-- White circle with red border -->
  <circle cx="60" cy="60" r="50" fill="white" stroke="#CC0000" stroke-width="5"/>
  <!-- U-turn arrow -->
  <path d="M70,75 L70,48 Q70,35 57,35 Q44,35 44,48 L44,55" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head pointing down -->
  <polygon points="36,50 44,62 52,50" fill="#333"/>
  <!-- Red diagonal slash -->
  <line x1="25" y1="25" x2="95" y2="95" stroke="#CC0000" stroke-width="5" stroke-linecap="round"/>
</svg>
