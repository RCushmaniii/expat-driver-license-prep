<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" width="500" height="500" viewBox="0 0 500 500"
     xmlns="http://www.w3.org/2000/svg">

  <rect x="10" y="10" width="480" height="480" rx="30" ry="30" fill="#ffffff" stroke="#000" stroke-width="12"/>
  <circle cx="250" cy="250" r="192" fill="#0055aa" stroke="none"/>
  <circle cx="250" cy="250" r="158" fill="#ffffff" stroke="none"/>
  <!-- Left-curve arrow: arc going left then down -->
  <path d="M 300,340 C 300,240 195,175 195,175" fill="none" stroke="#000" stroke-width="38" stroke-linecap="round"/>
  <!-- Vertical stem on right -->
  <rect x="281" y="165" width="38" height="110" fill="#000" transform="scale(-1,1) translate(-500,0)"/>
  <!-- Stem going down on left -->
  <rect x="176" y="165" width="38" height="110" fill="#000"/>
  <!-- Arrowhead pointing left -->
  <polygon points="210,145 110,195 210,245" fill="#000"/>

</svg>
