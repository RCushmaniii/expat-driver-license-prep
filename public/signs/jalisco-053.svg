<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <title>Asymmetric road narrowing — restrictive sign</title>
  <!-- White rectangle with red border -->
  <rect x="10" y="10" width="100" height="100" rx="4" fill="white" stroke="#CC0000" stroke-width="5"/>
  <!-- Road narrowing symbol — wider at top, narrow at bottom-right -->
  <path d="M35,30 L35,90 L50,90 L50,30 Z" fill="#333" opacity="0.9"/>
  <path d="M70,30 L85,30 L65,90 L50,90 Z" fill="#333" opacity="0.9"/>
  <!-- Center line -->
  <line x1="50" y1="35" x2="50" y2="85" stroke="white" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
