<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <title>Yield — regulatory inverted triangle sign</title>
  <!-- Inverted triangle with red border -->
  <polygon points="60,100 10,20 110,20" fill="white" stroke="#CC0000" stroke-width="5" stroke-linejoin="round"/>
  <!-- Inner border -->
  <polygon points="60,88 22,28 98,28" fill="none" stroke="#CC0000" stroke-width="2" stroke-linejoin="round"/>
  <!-- CEDA text (Spanish for Yield) -->
  <text x="60" y="52" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#CC0000">CEDA</text>
  <text x="60" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#CC0000">EL PASO</text>
</svg>
