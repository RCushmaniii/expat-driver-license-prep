<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <title>No stopping — prohibitive sign with red X</title>
  <!-- White circle with red border -->
  <circle cx="60" cy="60" r="50" fill="white" stroke="#CC0000" stroke-width="5"/>
  <!-- Red X (no stopping = two diagonal lines) -->
  <line x1="30" y1="30" x2="90" y2="90" stroke="#CC0000" stroke-width="5" stroke-linecap="round"/>
  <line x1="90" y1="30" x2="30" y2="90" stroke="#CC0000" stroke-width="5" stroke-linecap="round"/>
</svg>
