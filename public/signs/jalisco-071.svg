<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <title>Exit / lateral junction — informative sign</title>
  <!-- Blue rectangle -->
  <rect x="8" y="20" width="104" height="80" rx="6" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
  <!-- White inner border -->
  <rect x="14" y="26" width="92" height="68" rx="4" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Main road arrow (straight) -->
  <line x1="50" y1="82" x2="50" y2="42" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <polygon points="42,46 50,32 58,46" fill="white"/>
  <!-- Exit arrow branching right -->
  <path d="M50,62 Q65,55 80,42" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <polygon points="76,36 84,36 80,46" fill="white"/>
</svg>
