<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <title>Restricted clearance height — restrictive sign</title>
  <!-- White rectangle with red border -->
  <rect x="10" y="10" width="100" height="100" rx="4" fill="white" stroke="#CC0000" stroke-width="5"/>
  <!-- Double-headed vertical arrow showing height restriction -->
  <line x1="60" y1="28" x2="60" y2="75" stroke="#333" stroke-width="3"/>
  <!-- Top arrowhead -->
  <polygon points="52,32 60,22 68,32" fill="#333"/>
  <!-- Bottom arrowhead -->
  <polygon points="52,71 60,81 68,71" fill="#333"/>
  <!-- Bridge/barrier at top -->
  <rect x="25" y="22" width="70" height="5" rx="1" fill="#333"/>
  <!-- Ground line -->
  <line x1="25" y1="82" x2="95" y2="82" stroke="#333" stroke-width="3"/>
  <!-- Height measurement text -->
  <text x="60" y="98" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">3.50 m</text>
</svg>
