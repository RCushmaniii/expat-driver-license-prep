<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <title>Restricted width — restrictive sign</title>
  <!-- White rectangle with red border -->
  <rect x="10" y="10" width="100" height="100" rx="4" fill="white" stroke="#CC0000" stroke-width="5"/>
  <!-- Double-headed horizontal arrow showing width restriction -->
  <line x1="28" y1="55" x2="92" y2="55" stroke="#333" stroke-width="3"/>
  <!-- Left arrowhead -->
  <polygon points="32,47 22,55 32,63" fill="#333"/>
  <!-- Right arrowhead -->
  <polygon points="88,47 98,55 88,63" fill="#333"/>
  <!-- Left wall -->
  <rect x="22" y="30" width="5" height="50" rx="1" fill="#333"/>
  <!-- Right wall -->
  <rect x="93" y="30" width="5" height="50" rx="1" fill="#333"/>
  <!-- Width measurement text -->
  <text x="60" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">2.50 m</text>
</svg>
